<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your FITNEO password</title>
  </head>
  <body style="margin:0;background:#060914;color:#ffffff;font-family:Inter,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#060914;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#101827;border:1px solid rgba(255,255,255,0.10);border-radius:24px;padding:32px;">
            <tr>
              <td>
                <p style="margin:0 0 8px;color:#0A84FF;font-size:12px;font-weight:800;letter-spacing:2px;">FITNEO SECURITY</p>
                <h1 style="margin:0 0 16px;color:#ffffff;font-size:28px;line-height:1.2;">Reset your password</h1>
                <p style="margin:0 0 24px;color:rgba(255,255,255,0.72);font-size:15px;line-height:1.6;">
                  We received a request to reset the password for your FITNEO account. If this was you, use the secure button below.
                </p>
                <p style="margin:0 0 28px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0A84FF;color:#ffffff;text-decoration:none;font-weight:800;border-radius:14px;padding:14px 22px;">
                    Reset FITNEO password
                  </a>
                </p>
                <p style="margin:0;color:rgba(255,255,255,0.54);font-size:13px;line-height:1.6;">
                  If you did not request this reset, you can safely ignore this email. This link expires automatically for your protection.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
